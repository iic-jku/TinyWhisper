meta:
  version: 3
  flow: Classic
  substituting_steps:

    # Disable KLayout DRC
    KLayout.DRC: null
    Checker.KLayoutDRC: null

    # Disable KLayout antenna check
    #KLayout.Antenna: null
    #Checker.KLayoutAntenna: null

    # Disable KLayout density check
    #KLayout.Density: null
    #Checker.KLayoutDensity: null

    # Save time during development
    # Enable for sign-off
    #OpenROAD.IRDropReport: null
    #Magic.DRC: null
    #Checker.MagicDRC: null
    #KLayout.XOR: null
    #Netgen.LVS: null
    #Checker.LVS: null

    # Disable setup violation errors
    # Checker.SetupViolations: null

DESIGN_NAME: tinywhisper_riscv
VERILOG_FILES: ["dir::../verilog/constants.sv",
"dir::../verilog/rtl/tinywhisper_riscv.sv",
"dir::../verilog/rtl/alu.sv",
"dir::../verilog/rtl/lo_gen.v",
"dir::../verilog/rtl/csr.sv",
"dir::../verilog/rtl/memory.sv",
"dir::../verilog/rtl/dsmod.v",
"dir::../verilog/rtl/regs.sv",
"dir::../verilog/rtl/freq_generator.sv",
"dir::../verilog/rtl/spi_master.sv",
"dir::../verilog/rtl/control.sv",
"dir::../verilog/rtl/i2c_master.sv",
"dir::../verilog/rtl/imm_gen.sv",
"dir::../verilog/rtl/uart_tx.v",
"dir::../verilog/rtl/uart_rx.v",
"dir::../verilog/rtl/cordic_slice.v",
"dir::../verilog/rtl/cordic_iterative.v",
"dir::../verilog/rtl/instructioncounter.sv"]


# Enable plugin for better SystemVerilog support
# USE_SLANG: True

# Slightly smaller file sizes
PRIMARY_GDSII_STREAMOUT_TOOL: klayout

# Layout / Floorplan Rules
DIE_AREA: [0, 0, 1600, 1400]
# PL_TARGET_DENSITY_PCT: 32
PL_TARGET_DENSITY_PCT: 28
GRT_ALLOW_CONGESTION: true
RUN_MAGIC_DRC: true
RUN_CTS: true
# Valid values are AREA 0-3 and DELAY 0-4
# DELAY 4 = fastest, but largest area
# AREA 3 = slowest, but smallest area
SYNTH_STRATEGY: DELAY 4

FP_PIN_ORDER_CFG: dir::pin_order.cfg
FP_PDN_MULTILAYER: false
FP_SIZING: absolute

# Power / ground nets
VDD_NETS: ["VDD"]
GND_NETS: ["VSS"]
VERILOG_POWER_DEFINE: "USE_POWER_PINS"

# Clock
CLOCK_PORT: clk
CLOCK_NET: clk
CLOCK_PERIOD: 17 # in ns == ~56MHz

# SDC files
PNR_SDC_FILE: dir::impl.sdc
SIGNOFF_SDC_FILE: dir::signoff.sdc

# Fix setup violations
# PL_RESIZER_SETUP_SLACK_MARGIN: 0.60
# GRT_RESIZER_SETUP_SLACK_MARGIN: 0.55

# Fix hold violations
GRT_RESIZER_HOLD_SLACK_MARGIN: 0.05
PL_RESIZER_HOLD_SLACK_MARGIN: 0.1
# PL_RESIZER_HOLD_MAX_BUFFER_PCT: 100
