#--------------------------------------------------------------
# CACE circuit characterization file
#--------------------------------------------------------------

name:           wspr_tx_iqmod_mfb_lpf_ota_core_hybrid_bm
description:    Inverter-Based OTA
PDK:            sky130A

cace_format:    5.2

authorship:
  designer:         Simon Dorrer
  company:          Johannes Kepler University
  creation_date:    August 18, 2025
  license:          Apache 2.0

paths:
  root:             ..
  schematic:        xschem
  netlist:          cace/netlist
  documentation:    cace/_docs
  runs:             cace/_runs

pins:
  VDD:
    description: Positive analog power supply
    type: power
    direction: inout
    Vmin: 1.7
    Vmax: 1.9
  VSS:
    description: Analog ground
    type: ground
    direction: inout
  Vcm:
    description: Common-mode voltage
    type: power
    direction: inout
  di_ota_core_en:
    description: Enable input
    type: enable
    direction: input  
  vinp:
    description: Voltage positive input
    type: signal
    direction: input
  vinn:
    description: Voltage negative input
    type: signal
    direction: input
  voutp:
    description: Voltage positive output
    type: signal
    direction: output
  voutn:
    description: Voltage negative output
    type: signal
    direction: output 

default_conditions:
  vdd:
    description: Analog power supply voltage
    display: VDD
    unit: V
    typical: 1.8
  vcm:
    description: Input common-mode voltage
    display: Vcm
    unit: V
    typical: 0.90
  corner:
    description: Process corner
    display: Corner
    typical: tt
  temp:
    description: Ambient temperature
    display: Temperature
    unit: °C
    typical: 27
  cload:
    description: Load capacitance
    display: Cload
    unit: pF
    typical: 10

parameters:
  ac_params:
    spec:
      Adc_ol_dB:
        display: Open-loop dc gain
        description: Small-signal open-loop gain at 10Hz
        unit: dB
        minimum:
          value: 30
        typical:
          value: any
        maximum:
          value: any
      fcu:
        display: Upper -3dB cut-off frequency
        description: Upper -3dB cut-off frequency
        unit: Hz
        minimum:
          value: 500000
        typical:
          value: any
        maximum:
          value: any
      CMRR_dc_dB:
        display: Common-mode Rejection Ratio
        description: Small-signal CMRR at 10Hz
        unit: dB
        minimum:
          value: 40
        typical:
          value: any
        maximum:
          value: any
      # PSRR_dc_dB:
        # display: Power-Supply Rejection Ratio
        # description: Small-signal PSRR at 10Hz
        # unit: dB
        # minimum:
          # value: 40
        # typical:
          # value: any
        # maximum:
          # value: any
    tool:
      ngspice:
        template: wspr_tx_iqmod_mfb_lpf_ota_core_tb_ac.sch
        format: ascii
        suffix: .data
        # variables: [Adc_ol_dB, fcu, CMRR_dc_dB, PSRR_dc_dB]
        variables: [Adc_ol_dB, fcu, CMRR_dc_dB]
    plot:
      Adc_ol_dB_vs_vdd:
        type: xyplot
        xaxis: vdd
        yaxis: Adc_ol_dB
        limits: auto
      Adc_ol_dB_vs_vcm:
        type: xyplot
        xaxis: vcm
        yaxis: Adc_ol_dB
        limits: auto
      Adc_ol_dB_vs_corner:
        type: xyplot
        xaxis: corner
        yaxis: Adc_ol_dB
        limits: auto
      Adc_ol_dB_vs_temp:
        type: xyplot
        xaxis: temp
        yaxis: Adc_ol_dB
        limits: auto
      Adc_ol_dB_vs_cload:
        type: xyplot
        xaxis: cload
        yaxis: Adc_ol_dB
        limits: auto
      fcu_vs_vdd:
        type: xyplot
        xaxis: vdd
        yaxis: fcu
        limits: auto
      fcu_vs_vcm:
        type: xyplot
        xaxis: vcm
        yaxis: fcu
        limits: auto
      fcu_vs_corner:
        type: xyplot
        xaxis: corner
        yaxis: fcu
        limits: auto
      fcu_vs_temp:
        type: xyplot
        xaxis: temp
        yaxis: fcu
        limits: auto
      fcu_vs_cload:
        type: xyplot
        xaxis: cload
        yaxis: fcu
        limits: auto
      CMRR_vs_vdd:
        type: xyplot
        xaxis: vdd
        yaxis: CMRR_dc_dB
        limits: auto
      CMRR_vs_vcm:
        type: xyplot
        xaxis: vcm
        yaxis: CMRR_dc_dB
        limits: auto
      CMRR_vs_corner:
        type: xyplot
        xaxis: corner
        yaxis: CMRR_dc_dB
        limits: auto
      CMRR_vs_temp:
        type: xyplot
        xaxis: temp
        yaxis: CMRR_dc_dB
        limits: auto
      CMRR_vs_cload:
        type: xyplot
        xaxis: cload
        yaxis: CMRR_dc_dB
        limits: auto
      # PSRR_vs_vdd:
        # type: xyplot
        # xaxis: vdd
        # yaxis: PSRR_dc_dB
        # limits: auto
      # PSRR_vs_vcm:
        # type: xyplot
        # xaxis: vcm
        # yaxis: PSRR_dc_dB
        # limits: auto
      # PSRR_vs_corner:
        # type: xyplot
        # xaxis: corner
        # yaxis: PSRR_dc_dB
        # limits: auto
      # PSRR_vs_temp:
        # type: xyplot
        # xaxis: temp
        # yaxis: PSRR_dc_dB
        # limits: auto
      # PSRR_vs_cload:
        # type: xyplot
        # xaxis: cload
        # yaxis: PSRR_dc_dB
        # limits: auto
    conditions:
      vdd:
        #minimum: 1.7
        typical: 1.8
        #maximum: 1.9
      vcm:
        minimum: 0.70
        typical: 0.90
        maximum: 1.10
      corner:
        # enumerate: [ss, sf, tt, fs, ff]
        typical: tt
      temp:
        #minimum: 0
        typical: 27
        #maximum: 70
      cload:
        #minimum: 1       # 1pF
        typical: 10       # 10pF
        #maximum: 50      # 50pF
  
  ac_mc_params:
    spec:
      Adc_ol_dB:
        display: Open-loop dc gain - Monte Carlo
        description: Small-signal open-loop gain at 10Hz
        unit: dB
        minimum:
          value: 30
        typical:
          value: any
        maximum:
          value: any
