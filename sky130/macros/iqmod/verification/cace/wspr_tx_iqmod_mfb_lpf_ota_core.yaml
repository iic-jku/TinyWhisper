        # unit: dB
        # minimum:
          # value: 40
        # typical:
          # value: any
        # maximum:
          # value: any
    tool:
      ngspice:
        template: wspr_tx_iqmod_mfb_lpf_ota_core_tb_ac.sch
        collate: iterations
        format: ascii
        suffix: .data
        # variables: [Adc_ol_dB, fcu, CMRR_dc_dB, PSRR_dc_dB]
        variables: [Adc_ol_dB, fcu, CMRR_dc_dB]
        script: wspr_tx_iqmod_mfb_lpf_ota_core_tb_ac.py
        # script_variables: [Adc_ol_dB_arr, fcu_arr, CMRR_dc_dB_arr, PSRR_dc_dB_arr]
        script_variables: [Adc_ol_dB_arr, fcu_arr, CMRR_dc_dB_arr]
    plot:
      Adc_ol_dB_mc:
        type: histogram
        xaxis: Adc_ol_dB_arr
      fcu_mc:
        type: histogram
